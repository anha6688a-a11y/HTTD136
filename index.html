<!DOCTYPE html>
<html lang="vi" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Phân Luồng & Theo Dõi Tiến Độ Hồ Sơ Tín Dụng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-full text-slate-800 font-sans flex flex-col">
    <div id="toast-container" class="fixed top-4 right-4 z-[9999] pointer-events-none"></div>
    <div id="app" class="min-h-screen flex flex-col">
        <div id="app-loading" class="flex-grow flex flex-col items-center justify-center bg-slate-900 text-white p-6 text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500 mb-4"></div>
            <p class="text-sm font-semibold tracking-wider text-slate-400">Đang khởi tạo hệ thống...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. CẤU HÌNH DỮ LIỆU CỐ ĐỊNH (ĐỂ TRÁNH LỖI NOT DEFINED)
        // ==========================================
        const ROLES = { ADMIN: "Admin", CB_QHKH: "CB QHKH", CB_HTTD: "CB HTTD", LD_PKH: "LĐ P.KH", LD_PHTTD: "LĐ P.HTTD" };
        
        const INITIAL_USERS = [
            { username: "admin", password: "anhmq2402", name: "Ma Quốc Anh", role: ROLES.ADMIN, department: "Ban Giám Đốc" },
            { username: "qhkh_an", password: "123", name: "Nguyễn Văn An", role: ROLES.CB_QHKH, department: "Phòng QHKH 1" },
            { username: "httd_binh", password: "123", name: "Trần Thị Bình", role: ROLES.CB_HTTD, department: "Phòng HTTD" }
        ];

        const INITIAL_DOSSIERS = [
            {
                id: "HS-2026-001", customerName: "Công ty TNHH MTV Minh Phát", loanAmount: 5500000000, 
                dossierType: "HS GHTD", priority: "URGENT", currentStage: 2, isCompleted: false, 
                createdAt: new Date().toISOString(), creatorName: "Nguyễn Văn An", history: []
            }
        ];

        const state = {
            usersList: INITIAL_USERS,
            dossiers: INITIAL_DOSSIERS,
            appUser: JSON.parse(localStorage.getItem('credit_app_user')) || null,
            activeTab: "list", selectedDossier: null, showCreateModal: false, showActionModal: false, 
            pendingActionType: "", actionComment: "", showZoomModal: false, zoomImageUrl: ""
        };

        // ==========================================
        // 2. CÁC HÀM XỬ LÝ SỰ KIỆN TOÀN CỤC
        // ==========================================
        window.selectDossier = (id) => {
            const d = state.dossiers.find(x => x.id === id);
            if (d) { state.selectedDossier = d; updateUI(); }
        };

        window.closeDossierDetail = () => { state.selectedDossier = null; updateUI(); };
        window.openCreateModal = () => { state.showCreateModal = true; updateUI(); };
        window.closeCreateModal = () => { state.showCreateModal = false; updateUI(); };
        window.changeTab = (t) => { state.activeTab = t; updateUI(); };
        window.handleAppLogout = () => { localStorage.removeItem('credit_app_user'); state.appUser = null; updateUI(); };
        
        window.handleAppLogin = (e) => {
            e.preventDefault();
            const u = document.getElementById("login-username").value;
            const p = document.getElementById("login-password").value;
            const user = state.usersList.find(x => x.username === u && x.password === p);
            if (user) {
                state.appUser = user;
                localStorage.setItem('credit_app_user', JSON.stringify(user));
                updateUI();
            } else {
                alert("Sai tài khoản hoặc mật khẩu!");
            }
        };

        // ==========================================
        // 3. RENDER UI
        // ==========================================
        function updateUI() {
            const app = document.getElementById("app");
            if (!state.appUser) {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center bg-slate-900 p-4">
                        <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-xl text-center">
                            <h2 class="text-xl font-bold mb-6">Đăng Nhập Hệ Thống</h2>
                            <form onsubmit="handleAppLogin(event)" class="space-y-4">
                                <input id="login-username" type="text" placeholder="Username (thử: admin)" class="w-full p-3 border rounded-lg" required>
                                <input id="login-password" type="password" placeholder="Password (thử: anhmq2402)" class="w-full p-3 border rounded-lg" required>
                                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700">Đăng Nhập</button>
                            </form>
                        </div>
                    </div>
                `;
            } else {
                app.innerHTML = `
                    <nav class="bg-slate-900 text-white p-4 flex justify-between">
                        <h1 class="font-bold">Hệ Thống Tín Dụng</h1>
                        <button onclick="handleAppLogout()">Đăng xuất</button>
                    </nav>
                    <div class="p-6">
                        <div class="grid gap-4">
                            ${state.dossiers.map(d => `
                                <div onclick="selectDossier('${d.id}')" class="bg-white p-4 rounded-xl border shadow cursor-pointer hover:border-indigo-500">
                                    <h3 class="font-bold">${d.customerName}</h3>
                                    <p class="text-sm text-slate-500">Số tiền: ${d.loanAmount.toLocaleString()} VNĐ</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ${state.selectedDossier ? renderModal() : ''}
                `;
            }
        }

        function renderModal() {
            const d = state.selectedDossier;
            return `
                <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 p-4" onclick="closeDossierDetail()">
                    <div class="bg-white w-full max-w-lg rounded-2xl p-6 shadow-2xl animate-fade-in" onclick="event.stopPropagation()">
                        <h2 class="text-lg font-bold mb-4">Chi tiết: ${d.customerName}</h2>
                        <p class="mb-2">Số tiền: ${d.loanAmount.toLocaleString()} VNĐ</p>
                        <p class="text-sm text-slate-600 mb-4">Trạng thái: ${d.isCompleted ? 'Hoàn tất' : 'Đang xử lý'}</p>
                        <button onclick="closeDossierDetail()" class="mt-6 w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-black">Đóng</button>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 4. KẾT NỐI & KHỞI CHẠY
        // ==========================================
        // Giả lập load
        setTimeout(() => {
            document.getElementById("app-loading").remove();
            updateUI();
        }, 1000);

    </script>
</body>
</html>
