        // KHỞI ĐỘNG KẾT NỐI HỆ THỐNG

                    isOfflineMode = true;
                    setupOfflineMode();

                db = getFirestore(app);

                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                clearTimeout(fallbackTimeout);
                setupRealtimeListeners();
            } catch (err) {
                console.error("Firebase Connection Error:", err);
                clearTimeout(fallbackTimeout);
                firebaseDiagnosticError = err.code || err.message || err.toString();
                isOfflineMode = true;
                setupOfflineMode();
                window.showToast("Đang chạy offline demo do lỗi kết nối Firebase!", "warning");
            }
        }

        // THIẾT LẬP CHẾ ĐỘ OFFLINE TRONG RAM
        function setupOfflineMode() {
            const localUsers = localStorage.getItem(`${appId}_offline_users`);
            const localDossiers = localStorage.getItem(`${appId}_offline_dossiers`);

            if (localUsers) state.usersList = JSON.parse(localUsers);
            if (localDossiers) state.dossiers = JSON.parse(localDossiers);

            const loadingEl = document.getElementById("app-loading");
            if (loadingEl) loadingEl.remove();

            updateUI();
        }

        function saveOfflineStateToStorage() {
            if (!isOfflineMode) return;
            localStorage.setItem(`${appId}_offline_users`, JSON.stringify(state.usersList));
            localStorage.setItem(`${appId}_offline_dossiers`, JSON.stringify(state.dossiers));
        }

        // ĐỒNG BỘ FIRESTORE THỜI GIAN THỰC (ONLINE MODE)
        function setupRealtimeListeners() {
            const usersCollection = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            const dossiersCollection = collection(db, 'artifacts', appId, 'public', 'data', 'dossiers');
            const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');

            // Lắng nghe cấu hình Logo chung của hệ thống trên Cloud
            onSnapshot(configDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const cloudLogo = data.customLogo || "";
                    if (state.customLogo !== cloudLogo) {
                        state.customLogo = cloudLogo;
                        if (cloudLogo) {
                            localStorage.setItem(`${appId}_custom_logo`, cloudLogo);
                        } else {
                            localStorage.removeItem(`${appId}_custom_logo`);
                        }
                        updateUI();
                    }
                } else {
                    if (state.customLogo) {
                        state.customLogo = "";
                        localStorage.removeItem(`${appId}_custom_logo`);
                        updateUI();
                    }
                }
            }, (err) => {
                console.error("Lỗi đồng bộ cấu hình Logo:", err);
            });

            // Lắng nghe Users
            onSnapshot(usersCollection, (snapshot) => {
                const users = [];
                snapshot.forEach(doc => users.push({ id: doc.id, ...doc.data() }));

                if (users.length === 0) {
                    seedDatabaseOnline();
                } else {
                    state.usersList = users;
                    if (state.appUser) {
                        const freshUser = users.find(u => u.username === state.appUser.username);
                        if (freshUser) {
                            state.appUser = freshUser;
                            localStorage.setItem(`${appId}_logged_user`, JSON.stringify(freshUser));
                        }
                    }
                }
                updateUI();
            }, (err) => {
                console.error("Lỗi đồng bộ Users:", err);
                isOfflineMode = true;
                setupOfflineMode();
            });

            // Lắng nghe Hồ sơ
            onSnapshot(dossiersCollection, (snapshot) => {
                const dossiersData = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.isCompleted === undefined) data.isCompleted = false;
                    dossiersData.push({ id: doc.id, ...data });
                });
                dossiersData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                state.dossiers = dossiersData;

                if (state.selectedDossier) {
                    const freshDossier = dossiersData.find(d => d.id === state.selectedDossier.id);
                    state.selectedDossier = freshDossier || null;
                }

                const loadingEl = document.getElementById("app-loading");
                if (loadingEl) loadingEl.remove();

                updateUI();
            }, (err) => {
                console.error("Lỗi đồng bộ Dossiers:", err);
                isOfflineMode = true;
                setupOfflineMode();
            });
        }

                window.showToast("Khởi tạo bộ dữ liệu mẫu lên Cloud thành công!", "success");
            } catch (err) {
                console.error("Seed Online Error:", err);

        window.handleLogoUpload = (event) => {
            const file = event.target.files[0];

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement("canvas");
                    let width = img.width, height = img.height;
                    const maxDim = 350;
                    if (width > maxDim || height > maxDim) {
                        if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; } 
                        else { width = Math.round((width * maxDim) / height); height = maxDim; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL("image/png");
                    
                    state.customLogo = base64;
                    localStorage.setItem(`${appId}_custom_logo`, base64);
                    window.showToast("Tải Logo lên thành công!", "success");
                    updateUI();

                    // Đồng bộ Logo tùy biến lên Firestore
                    if (!isOfflineMode) {
                        try {
                            const configDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config');
                            await setDoc(configDocRef, { customLogo: base64 }, { merge: true });

                            window.showToast("Không thể đồng bộ Logo lên Cloud!", "error");
                        }
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        function getVisibleDossiers() {
            if (!state.appUser) return [];
            const role = state.appUser.role;
            const username = state.appUser.username;

            let list = state.dossiers;
            if (state.activeTab === "list") list = state.dossiers.filter(d => !d.isCompleted);
            else if (state.activeTab === "history") list = state.dossiers.filter(d => d.isCompleted);

            if (role === ROLES.ADMIN || role === ROLES.CB_HTTD || role === ROLES.LD_PHTTD) return list;
            if (role === ROLES.CB_QHKH) return list.filter(d => d.creatorUsername === username);
            if (role === ROLES.LD_PKH) return list.filter(d => d.ldkhFollower === username);
            return [];

        function calculateOverdueDays(commitmentDateStr) {
            const today = new Date(); today.setHours(0,0,0,0);
            const commitment = new Date(commitmentDateStr); commitment.setHours(0,0,0,0);
            return Math.ceil((today - commitment) / (1000 * 60 * 60 * 24));
        }

        function getOverdueRemedies() {
            const overdueList = [];
            state.dossiers.forEach(d => {
                if (!d.isCompleted && d.currentStage === 4 && d.isDebting && d.debts) {
                    d.debts.forEach(debt => {
                        if (debt.status === "PENDING") {
                            const days = calculateOverdueDays(debt.commitmentDate);
                            if (days > 0) {
                                overdueList.push({
                                    dossierId: d.id, customerName: d.customerName,
                                    docName: debt.docName, commitmentDate: debt.commitmentDate,
                                    creatorName: d.creatorName, daysOverdue: days
                                });
                            }
                        }
                    });
                }
            });
            return overdueList;
        }

            const allDebtsRecovered = updatedDebts.every(d => d.status === "COMPLETED");
            let autoArchive = false;
            let finalHistory = [...state.selectedDossier.history];

            if (allDebtsRecovered && updatedDebts.length > 0) {
                autoArchive = true;
                const currentTimeStr = new Date().toISOString();
                const lastIdx = finalHistory.length - 1;
                const lastLog = { ...finalHistory[lastIdx] };
                lastLog.endTime = currentTimeStr;
                const diffMs = new Date(currentTimeStr) - new Date(lastLog.startTime);
                const minutes = Math.floor((diffMs / 1000) / 60);
                lastLog.duration = Math.floor(minutes / 60) > 0 ? `${Math.floor(minutes / 60)} giờ ${minutes % 60} phút` : `${minutes % 60} phút`;

            }

            state.selectedDossier.debts = updatedDebts;
            if (autoArchive) {
                state.selectedDossier.isCompleted = true;
                state.selectedDossier.history = finalHistory;
            }

            try {
                if (isOfflineMode) {
                    const targetId = state.selectedDossier.id;
                    if (autoArchive) {
                        state.selectedDossier = null;
                    }
                    state.dossiers = state.dossiers.map(d => d.id === targetId ? (state.selectedDossier || d) : d);

        window.confirmTransition = async () => {
            const dossierId = state.selectedDossier.id;
            const targetDossier = state.dossiers.find(d => d.id === dossierId);
            if (!targetDossier) return;

            const currentStageId = targetDossier.currentStage;
            const currentTimeStr = new Date().toISOString();
            let updatedHistory = [...targetDossier.history];
            let nextStage = currentStageId;
            let assignedActor = targetDossier.assignedHTTD;
            let isDossierNowCompleted = false;

            const currentStepIndex = updatedHistory.length - 1;
            const currentStep = { ...updatedHistory[currentStepIndex] };
            currentStep.endTime = currentTimeStr;

            const diffMs = new Date(currentTimeStr) - new Date(currentStep.startTime);
            const minutes = Math.floor((diffMs / 1000) / 60);
            currentStep.duration = Math.floor(minutes / 60) > 0 ? `${Math.floor(minutes / 60)} giờ ${minutes % 60} phút` : `${minutes % 60} phút`;
            
            const finalComment = state.actionComment.trim() ? state.actionComment.trim() : "Không có ý kiến";
            currentStep.action = state.pendingActionType === "NEXT" ? "Đã duyệt và bàn giao chuyển tiếp" : "Yêu cầu làm lại / Chỉnh sửa";
            currentStep.comment = finalComment;
            if (state.temporaryAttachedImage) currentStep.attachedImage = state.temporaryAttachedImage;
            updatedHistory[currentStepIndex] = currentStep;

            if (state.pendingActionType === "NEXT") {
                if (currentStageId === 3) {
                    const ldHasComment = finalComment !== "Không có ý kiến" || state.temporaryAttachedImage !== "";
                    const httdStepLog = targetDossier.history.find(h => h.stageId === 2);
                    const httdHasComment = httdStepLog && (httdStepLog.comment !== "Không có ý kiến" && httdStepLog.comment !== "") || (httdStepLog && httdStepLog.attachedImage);

                    if (!ldHasComment && !httdHasComment) {
                        isDossierNowCompleted = true;
                        updatedHistory.push({ stageId: 4, stageName: "4. Hoàn thiện / Bồi hoàn sau", actor: `${targetDossier.creatorName} (CB QHKH)`, action: "Hệ thống tự động hoàn tất - Đóng hồ sơ", startTime: currentTimeStr, endTime: currentTimeStr, duration: "0 phút", comment: "Hệ thống tự động Hoàn Tất do không phát sinh ý kiến bổ sung." });
                        window.showToast("Không phát sinh ý kiến. Hồ sơ tự động hoàn tất!", "success");
                    } else {
                        nextStage = 4;
                        updatedHistory.push({ stageId: 4, stageName: "4. Hoàn thiện / Bồi hoàn sau", actor: `${targetDossier.creatorName} (CB QHKH)`, action: "Chờ lập danh sách bồi hoàn hồ sơ", startTime: currentTimeStr, endTime: null, duration: null, comment: `Cần bồi hoàn theo ý kiến. Ý kiến LĐ HTTD: "${finalComment}". Ý kiến CB HTTD: "${httdStepLog?.comment || 'Không'}"` });
                        window.showToast("Đã chuyển sang Bước 4 (Bồi hoàn)!", "warning");
                    }
                } else if (currentStageId < 3) {
                    nextStage = currentStageId + 1;
                    let nextActor = "", actionDesc = "";
                    if (nextStage === 2) { nextActor = "CB HTTD tiếp nhận"; assignedActor = `${state.appUser.name} (CB HTTD)`; actionDesc = "Đang thẩm định & lập tờ trình"; } 
                    else if (nextStage === 3) { nextActor = "Ban Lãnh Đạo P.HTTD"; actionDesc = "Chờ ý kiến phê duyệt cuối cùng"; }
                    updatedHistory.push({ stageId: nextStage, stageName: STAGES.find(s => s.id === nextStage).name, actor: nextActor, action: actionDesc, startTime: currentTimeStr, endTime: null, duration: null, comment: "" });
                    window.showToast("Bàn giao chuyển bước thành công!", "success");
                }
            } else if (state.pendingActionType === "RETURN") {
                if (currentStageId > 1) {
                    nextStage = currentStageId - 1;
                    let prevActor = "";
                    if (nextStage === 1) prevActor = `${targetDossier.creatorName} (CB QHKH)`;
                    else if (nextStage === 2) prevActor = targetDossier.assignedHTTD;
                    updatedHistory.push({ stageId: nextStage, stageName: STAGES.find(s => s.id === nextStage).name + " (Yêu cầu làm lại)", actor: prevActor, action: "Yêu cầu chỉnh sửa bổ sung thông tin", startTime: currentTimeStr, endTime: null, duration: null, comment: `Lý do trả lại: ${finalComment}` });
                    window.showToast("Hồ sơ đã được trả về.", "info");
                }
            } else if (state.pendingActionType === "COMPLETE") {
                isDossierNowCompleted = true;
                const fullyClearedDebts = (targetDossier.debts || []).map(debt => ({ ...debt, status: "COMPLETED" }));
                currentStep.action = "CB HTTD phê duyệt đóng bồi hoàn - Đã nộp đủ chứng từ gốc";
                currentStep.comment = finalComment;
                updatedHistory[currentStepIndex] = currentStep;
                try {
                    if (isOfflineMode) state.selectedDossier.debts = fullyClearedDebts;
                    else await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'dossiers', dossierId), { debts: fullyClearedDebts });
                } catch(e) { console.error(e); }
                window.showToast("Bồi hoàn hoàn tất! Đã đưa hồ sơ vào Tab Lịch sử.", "success");
            }

            try {
                if (isOfflineMode) {
                    state.selectedDossier.currentStage = nextStage; state.selectedDossier.assignedHTTD = assignedActor;
                    state.selectedDossier.history = updatedHistory; state.selectedDossier.isCompleted = isDossierNowCompleted;
                    state.dossiers = state.dossiers.map(d => d.id === dossierId ? state.selectedDossier : d);
                    saveOfflineStateToStorage();
                    state.selectedDossier = null;
                } else {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'dossiers', dossierId);
                    await updateDoc(docRef, { currentStage: nextStage, assignedHTTD: assignedActor, history: updatedHistory, isCompleted: isDossierNowCompleted });
                    state.selectedDossier = null;
                }
                state.temporaryAttachedImage = ""; state.showActionModal = false; state.actionComment = "";
                updateUI();
            } catch (err) { console.error(err); window.showToast("Lỗi cập nhật dữ liệu!", "error"); }
        };

                                    <select id="create-dossier-type" class="w-full p-2.5 border border-slate-300 rounded-lg font-semibold text-slate-700 focus:outline-none">
                                        <option value="HS GHTD">HS GHTD</option>
                                        <option value="HS từng lần">HS từng lần</option>
                                        <option value="Hồ sơ khác">Hồ sơ khác</option>
                                    </select>
                                </div>
                                <div class="col-span-1">
                                    <label class="block text-[10px] font-bold text-slate-600 mb-1 uppercase">Mức độ ưu tiên *</label>
                                    <select id="create-priority" class="w-full p-2.5 border border-slate-300 rounded-lg font-bold text-slate-700 focus:outline-none">
                                        <option value="NORMAL">Thường</option>
                                        <option value="URGENT">⚠️ Ưu tiên khẩn cấp</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-600 mb-1 uppercase">LĐ P.KH cùng theo dõi (View-Only) *</label>
                                <select id="create-ldkh-follower" required class="w-full p-2.5 border border-slate-300 rounded-lg font-bold text-indigo-700 bg-indigo-50/50">
                                    ${state.usersList.filter(u => u.role === ROLES.LD_PKH).map(leader => `
                                        <option value="${leader.username}">👑 ${leader.name} (${leader.department})</option>
                                    `).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-600 mb-1 uppercase">Ý kiến khởi tạo / Ghi chú ban đầu</label>
                                <textarea id="create-comment" class="w-full p-2.5 border border-slate-300 rounded-lg focus:outline-none" rows="3" placeholder="Nhập mô tả sơ bộ..."></textarea>
                            </div>
                            <div class="flex justify-end gap-3 pt-3 border-t border-slate-100">
                                <button type="button" onclick="closeCreateModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-lg transition-colors">Hủy</button>
                                <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition-colors shadow-md">Gửi hồ sơ lên luồng</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderActionModal() {
            if (!state.showActionModal) return '';
            return `
                <div class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 animate-fade-in font-sans" onclick="closeActionModal()">
                    <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 max-w-md w-full overflow-hidden" onclick="event.stopPropagation()">
                        <div class="px-5 py-4 text-white flex justify-between items-center ${state.pendingActionType === 'NEXT' ? 'bg-emerald-600' : state.pendingActionType === 'RETURN' ? 'bg-rose-500' : 'bg-indigo-600'}">
                            <h3 class="font-bold text-xs uppercase tracking-wider">⚠️ Xác nhận luân chuyển tiến độ</h3>
                            <button onclick="closeActionModal()" class="text-white/80 hover:text-white text-lg">✕</button>
                        </div>
                        <div class="p-5 space-y-4 text-xs text-slate-600">
                            <p>Hành động luân chuyển hồ sơ:</p>
                            <div class="p-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 font-bold">
                                ${state.pendingActionType === 'NEXT' ? '👉 Phê duyệt & chuyển giao sang bước kế tiếp' : ''}
                                ${state.pendingActionType === 'RETURN' ? '↩️ Trả về bước trước để bổ sung thông tin' : ''}
                                ${state.pendingActionType === 'COMPLETE' ? '✅ Hoàn tất đóng hồ sơ (Lưu trữ lịch sử)' : ''}
                            </div>
                            <div class="flex justify-end gap-3 pt-3 border-t border-slate-100 font-sans">
                                <button type="button" onclick="closeActionModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-lg transition-colors">Quay lại</button>
                                <button onclick="confirmTransition()" class="px-4 py-2 text-white font-bold rounded-lg transition-colors shadow-md ${state.pendingActionType === 'NEXT' ? 'bg-emerald-600 hover:bg-emerald-700' : state.pendingActionType === 'RETURN' ? 'bg-rose-500 hover:bg-rose-600' : 'bg-indigo-600 hover:bg-indigo-700'}">Xác Nhận Đồng Bộ</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderChangePasswordModal() {
            if (!state.showChangePasswordModal) return '';
            return `
                <div class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 animate-fade-in font-sans" onclick="closeChangePasswordModal()">
                    <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 max-w-sm w-full overflow-hidden" onclick="event.stopPropagation()">
                        <div class="bg-gradient-to-r from-slate-900 to-indigo-950 px-5 py-4 text-white flex justify-between items-center">
                            <h3 class="font-extrabold text-sm uppercase tracking-wider">🔒 Đổi mật khẩu cá nhân</h3>
                            <button onclick="closeChangePasswordModal()" class="text-white/80 hover:text-white">✕</button>
                        </div>
                        <form id="change-password-form" class="p-5 space-y-4 text-xs">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Mật khẩu hiện tại *</label>
                                <input id="pw-current" type="password" required class="w-full p-2.5 border border-slate-300 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Mật khẩu mới *</label>
                                <input id="pw-new" type="password" required placeholder="Tối thiểu 3 ký tự..." class="w-full p-2.5 border border-slate-300 rounded-lg">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Xác nhận mật khẩu mới *</label>
                                <input id="pw-confirm" type="password" required class="w-full p-2.5 border border-slate-300 rounded-lg">
                            </div>
                            <div class="flex justify-end gap-2 pt-2 border-t border-slate-100 font-sans">
                                <button type="button" onclick="closeChangePasswordModal()" class="px-3 py-1.5 bg-slate-100 text-slate-700 font-bold rounded-lg text-xs">Hủy</button>
                                <button type="submit" class="px-4 py-1.5 bg-indigo-600 text-white font-bold rounded-lg text-xs shadow-md">Xác nhận</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderResetPasswordModal() {
            if (!state.showResetPasswordModal) return '';
            return `
                <div class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 animate-fade-in font-sans" onclick="closeResetPasswordModal()">
                    <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 max-w-sm w-full overflow-hidden" onclick="event.stopPropagation()">
                        <div class="bg-gradient-to-r from-slate-900 to-indigo-950 px-5 py-4 text-white flex justify-between items-center">
                            <h3 class="font-extrabold text-sm uppercase tracking-wider">🔑 Reset mật khẩu cán bộ</h3>
                            <button onclick="closeResetPasswordModal()" class="text-white/80 hover:text-white">✕</button>
                        </div>
                        <form id="admin-reset-password-form" class="p-5 space-y-4 text-xs">
                            <div>
                                <p class="text-slate-600 font-semibold font-sans">Tài khoản cán bộ: <span class="text-indigo-600 font-bold font-mono">${state.resetTargetUsername}</span></p>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Mật khẩu mới thay thế *</label>
                                <input id="admin-new-reset-password" type="text" required placeholder="Nhập mật khẩu..." class="w-full p-2.5 border border-slate-300 rounded-lg font-semibold">
                            </div>
                            <div class="flex justify-end gap-2 pt-2 border-t border-slate-100 font-sans">
                                <button type="button" onclick="closeResetPasswordModal()" class="px-3 py-1.5 bg-slate-100 text-slate-700 font-bold rounded-lg text-xs">Hủy</button>
                                <button type="submit" class="px-4 py-1.5 bg-emerald-600 text-white font-bold rounded-lg text-xs shadow-md">Xác Nhận</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderConfirmModal() {
            if (!state.showConfirmModal) return '';
            return `
                <div class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[60] animate-fade-in font-sans" onclick="handleConfirmNo()">
                    <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 max-w-sm w-full overflow-hidden" onclick="event.stopPropagation()">
                        <div class="bg-slate-100 px-5 py-3 border-b border-slate-200">
                            <h4 class="font-extrabold text-xs uppercase tracking-wider text-slate-800">${state.confirmTitle}</h4>
                        </div>
                        <div class="p-5 space-y-4 text-xs">
                            <p class="text-slate-600">${state.confirmMessage}</p>
                            <div class="flex justify-end gap-2 pt-2 border-t border-slate-100 font-sans">
                                <button onclick="handleConfirmNo()" class="px-3 py-1.5 bg-slate-100 text-slate-700 font-bold rounded-lg text-xs">Không</button>
                                <button onclick="handleConfirmYes()" class="px-4 py-1.5 bg-rose-600 text-white font-bold rounded-lg text-xs shadow-md">Đồng ý</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderZoomModal() {
            if (!state.showZoomModal) return '';
            return `
                <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[70] animate-fade-in" onclick="closeZoomModal()">
                    <div class="relative max-w-3xl w-full flex justify-center">
                        <button onclick="closeZoomModal()" class="absolute -top-10 right-0 bg-white/20 hover:bg-white/40 text-white font-bold h-8 w-8 rounded-full flex items-center justify-center text-lg">✕</button>
                        <img src="${state.zoomImageUrl}" class="max-h-[85vh] max-w-full object-contain rounded-xl border border-white/20 shadow-2xl" onclick="event.stopPropagation()">
                    </div>
                </div>
            `;
        }

        // ==========================================
        // CÁC SỰ KIỆN GIAO DIỆN (DOM EVENT LISTENERS)
        // ==========================================
        function registerDOMEventListeners() {
            // Định vị cho việc mở rộng các tính năng động sau khi render UI
            const searchInput = document.getElementById("search-input");
            if (searchInput) {
                searchInput.addEventListener("input", (e) => {
                    state.searchTerm = e.target.value;
                    renderDossiersListContainerOnly();
                });
            }

            const stageSelect = document.getElementById("filter-stage-select");
            if (stageSelect) {
                stageSelect.addEventListener("change", (e) => {
                    state.filterStage = e.target.value;
                    renderDossiersListContainerOnly();
                });
            }

            const adminUserForm = document.getElementById("admin-user-form");
            if (adminUserForm) adminUserForm.addEventListener("submit", window.handleAdminSaveUser);

            const createForm = document.getElementById("create-dossier-form");
            if (createForm) createForm.addEventListener("submit", window.handleCreateDossierSubmit);

            const debtingCheckbox = document.getElementById("is-debting-checkbox");
            if (debtingCheckbox) debtingCheckbox.addEventListener("change", window.handleToggleDebting);

            const debtAddForm = document.getElementById("debt-add-form");
            if (debtAddForm) debtAddForm.addEventListener("submit", window.handleAddDebtItem);

            const changePasswordForm = document.getElementById("change-password-form");
            if (changePasswordForm) changePasswordForm.addEventListener("submit", window.handleChangePasswordSubmit);

            const adminResetForm = document.getElementById("admin-reset-password-form");
            if (adminResetForm) adminResetForm.addEventListener("submit", window.handleAdminResetPasswordSubmit);
        }

        function renderDossiersListContainerOnly() {
            const container = document.getElementById("dossiers-list-container");
            if (container) container.innerHTML = renderDossiersList(getVisibleDossiers());
        }

        function filteredDossiers() {
            const visible = getVisibleDossiers();
            return visible.filter(d => {
                const matchSearch = d.customerName.toLowerCase().includes(state.searchTerm.toLowerCase()) || 
                                    (d.id && d.id.toLowerCase().includes(state.searchTerm.toLowerCase())) ||
                                    d.dossierType.toLowerCase().includes(state.searchTerm.toLowerCase());
                
                const matchStage = (state.activeTab === "list" && state.filterStage !== "ALL") 
                    ? d.currentStage === parseInt(state.filterStage) 
                    : true;
                return matchSearch && matchStage;
            });
        }

        // ==========================================
        // WINDOW ACTIONS & BOOTSTRAP
        // ==========================================
        let totalCount = 0;

        function recalculateSummaryMetrics() {
            const visible = getVisibleDossiers();
            totalCount = visible.length;
        }

        // Khai báo ra window các hàm được gọi inline từ timeline và view
        window.selectDossier = selectDossier;
        window.closeDossierDetail = closeDossierDetail;
        window.closeCreateModal = closeCreateModal;
        window.closeActionModal = closeActionModal;
        window.closeChangePasswordModal = closeChangePasswordModal;
        window.closeResetPasswordModal = closeResetPasswordModal;

        window.onload = async () => {
            bootstrap();
        };
    </script>
</body>
</html>
